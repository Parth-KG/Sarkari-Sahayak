<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <rect width="1000" height="620" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Trebuchet MS, Arial, sans-serif" font-size="22" font-weight="bold" fill="#0F172A">
    System Architecture
  </text>
  <text x="500" y="65" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#64748B" font-style="italic">
    Citizen → Vapi ↔ FastAPI → Qdrant + Groq
  </text>

  <defs>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0D9488"/>
    </marker>
    <marker id="arrowNavy" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1E293B"/>
    </marker>
    <marker id="arrowQdrant" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#DC382D"/>
    </marker>
    <marker id="arrowGroq" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F55036"/>
    </marker>
  </defs>

  <!-- ========== TOP: CITIZEN (above Vapi) ========== -->
  <g transform="translate(140, 95)">
    <rect x="0" y="0" width="180" height="75" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="25" y="15" width="24" height="38" rx="4" fill="none" stroke="#0D9488" stroke-width="2"/>
    <circle cx="37" cy="48" r="2" fill="#0D9488"/>
    <line x1="31" y1="22" x2="43" y2="22" stroke="#0D9488" stroke-width="1.5"/>
    <text x="70" y="33" font-family="Trebuchet MS, Arial, sans-serif" font-size="14" font-weight="bold" fill="#0F172A">Citizen</text>
    <text x="70" y="50" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#64748B">Phone Call</text>
  </g>

  <!-- Audio arrow (bidirectional: Citizen ↔ Vapi) -->
  <line x1="230" y1="170" x2="230" y2="205" stroke="#0D9488" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <text x="245" y="191" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#0D9488" font-weight="bold">audio</text>

  <!-- ========== MIDDLE ROW: VAPI (left) + FASTAPI (right) side-by-side ========== -->

  <!-- VAPI (left) -->
  <g transform="translate(110, 205)">
    <rect x="0" y="0" width="240" height="110" rx="12" fill="#0D9488"/>
    <!-- Mic icon -->
    <rect x="25" y="25" width="16" height="26" rx="8" fill="#FFFFFF"/>
    <path d="M 16 45 Q 16 60, 33 60 Q 50 60, 50 45" stroke="#FFFFFF" stroke-width="2.2" fill="none"/>
    <line x1="33" y1="60" x2="33" y2="72" stroke="#FFFFFF" stroke-width="2.2"/>
    <line x1="25" y1="72" x2="41" y2="72" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
    <text x="70" y="38" font-family="Trebuchet MS, Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">VAPI.AI</text>
    <text x="70" y="58" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#CCFBF1">Telephony Bridge</text>
    <text x="70" y="75" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#CCFBF1">STT &amp; TTS Engine</text>
  </g>

  <!-- Vapi ↔ FastAPI arrows (two parallel horizontal arrows) -->
  <!-- Top: Vapi → FastAPI (JSON webhook, solid) -->
  <line x1="350" y1="235" x2="425" y2="235" stroke="#1E293B" stroke-width="2.5" marker-end="url(#arrowNavy)"/>
  <text x="388" y="225" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#1E293B" font-weight="bold">JSON webhook</text>
  <text x="388" y="250" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="9" fill="#64748B" font-style="italic">(user text)</text>

  <!-- Bottom: FastAPI → Vapi (text reply, dashed) -->
  <line x1="425" y1="285" x2="350" y2="285" stroke="#1E293B" stroke-width="2.5" stroke-dasharray="4,3" marker-end="url(#arrowNavy)"/>
  <text x="388" y="302" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#1E293B" font-weight="bold">text reply</text>

  <!-- FASTAPI (right) -->
  <g transform="translate(430, 205)">
    <rect x="0" y="0" width="280" height="110" rx="12" fill="#1E293B"/>
    <!-- Server icon -->
    <rect x="25" y="30" width="40" height="8" rx="1" fill="#14B8A6"/>
    <rect x="25" y="42" width="40" height="8" rx="1" fill="#14B8A6"/>
    <rect x="25" y="54" width="40" height="8" rx="1" fill="#14B8A6"/>
    <circle cx="60" cy="34" r="1.5" fill="#FFFFFF"/>
    <circle cx="60" cy="46" r="1.5" fill="#FFFFFF"/>
    <circle cx="60" cy="58" r="1.5" fill="#FFFFFF"/>
    <text x="85" y="40" font-family="Trebuchet MS, Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">FASTAPI BACKEND</text>
    <text x="85" y="60" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#CBD5E1">Orchestrator</text>
    <text x="85" y="78" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#94A3B8" font-style="italic">deployed on Render</text>
  </g>

  <!-- Render + UptimeRobot badges (right of FastAPI) -->
  <g transform="translate(730, 225)">
    <rect x="0" y="0" width="130" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <circle cx="14" cy="11" r="4" fill="#46E3B7"/>
    <text x="24" y="15" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#334155">hosted on Render</text>
  </g>
  <g transform="translate(730, 255)">
    <rect x="0" y="0" width="130" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <circle cx="14" cy="11" r="4" fill="#0D9488"/>
    <text x="24" y="15" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#334155">UptimeRobot ping</text>
  </g>

  <!-- FastAPI branches down to Qdrant (left) and Groq (right) -->
  <!-- Left branch -->
  <line x1="510" y1="315" x2="510" y2="360" stroke="#DC382D" stroke-width="2.5"/>
  <line x1="510" y1="360" x2="270" y2="360" stroke="#DC382D" stroke-width="2.5"/>
  <line x1="270" y1="360" x2="270" y2="470" stroke="#DC382D" stroke-width="2.5" marker-end="url(#arrowQdrant)"/>
  <text x="355" y="352" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#DC382D" font-weight="bold">vector search</text>

  <!-- Right branch -->
  <line x1="630" y1="315" x2="630" y2="360" stroke="#F55036" stroke-width="2.5"/>
  <line x1="630" y1="360" x2="735" y2="360" stroke="#F55036" stroke-width="2.5"/>
  <line x1="735" y1="360" x2="735" y2="470" stroke="#F55036" stroke-width="2.5" marker-end="url(#arrowGroq)"/>
  <text x="650" y="352" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#F55036" font-weight="bold">prompt + context</text>

  <!-- ========== BOTTOM ROW: QDRANT (left) + GROQ (right) ========== -->

  <!-- QDRANT -->
  <g transform="translate(180, 470)">
    <rect x="0" y="0" width="180" height="90" rx="12" fill="#DC382D"/>
    <ellipse cx="32" cy="28" rx="18" ry="6" fill="#FFFFFF"/>
    <path d="M 14 28 L 14 42 Q 14 48, 32 48 Q 50 48, 50 42 L 50 28" fill="#FFFFFF"/>
    <path d="M 14 42 L 14 54 Q 14 60, 32 60 Q 50 60, 50 54 L 50 42" fill="#FFFFFF" opacity="0.75"/>
    <text x="65" y="32" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">QDRANT DB</text>
    <text x="65" y="52" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#FECACA">Knowledge Store</text>
    <text x="65" y="68" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#FECACA">Scheme Embeddings</text>
  </g>

  <!-- GROQ -->
  <g transform="translate(645, 470)">
    <rect x="0" y="0" width="180" height="90" rx="12" fill="#F55036"/>
    <path d="M 34 14 L 18 42 L 30 42 L 24 66 L 46 36 L 34 36 L 42 14 Z"
          fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round"/>
    <text x="65" y="32" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">GROQ API</text>
    <text x="65" y="52" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#FFE4D6">LLM / Brain</text>
    <text x="65" y="68" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#FFE4D6">Ultra-Fast Inference</text>
  </g>

  <!-- Vector embeddings bridge between Qdrant ↔ Groq -->
  <line x1="365" y1="515" x2="640" y2="515" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="365 515, 372 511, 372 519" fill="#64748B"/>
  <polygon points="640 515, 633 511, 633 519" fill="#64748B"/>
  <rect x="410" y="503" width="185" height="24" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="0.8"/>
  <text x="502" y="519" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#334155" font-weight="bold">
    vector embeddings
  </text>

  <!-- Footer -->
  <text x="500" y="605" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#94A3B8" font-style="italic">
    SarkariSahayak · Team Batman · HackBlr 2026
  </text>
</svg>

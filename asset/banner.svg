<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="accentGlow" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#accentGlow)"/>

  <!-- Decorative circles (top right) -->
  <circle cx="1050" cy="80" r="180" fill="#0D9488" opacity="0.15"/>
  <circle cx="1120" cy="60" r="100" fill="#14B8A6" opacity="0.2"/>
  <circle cx="980" cy="140" r="60" fill="#14B8A6" opacity="0.25"/>

  <!-- Sound wave decoration (behind mic) -->
  <g transform="translate(100, 130)" opacity="0.25">
    <path d="M 0 30 Q 10 10, 20 30 T 40 30" stroke="#14B8A6" stroke-width="2" fill="none"/>
    <path d="M 0 30 Q 15 0, 30 30 T 60 30" stroke="#14B8A6" stroke-width="2" fill="none"/>
  </g>

  <!-- Microphone Icon -->
  <g transform="translate(100, 110)">
    <!-- Mic body -->
    <rect x="10" y="0" width="30" height="50" rx="15" fill="#14B8A6"/>
    <!-- Mic stand curve -->
    <path d="M 0 35 Q 0 60, 25 60 Q 50 60, 50 35" stroke="#14B8A6" stroke-width="4" fill="none"/>
    <!-- Stem -->
    <line x1="25" y1="60" x2="25" y2="80" stroke="#14B8A6" stroke-width="4"/>
    <!-- Base -->
    <line x1="12" y1="80" x2="38" y2="80" stroke="#14B8A6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="190" y="150" font-family="Trebuchet MS, Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF">
    SarkariSahayak
  </text>

  <!-- Subtitle -->
  <text x="190" y="195" font-family="Calibri, Arial, sans-serif" font-size="24" fill="#14B8A6">
    Voice AI Agent for Government Scheme Accessibility
  </text>

  <!-- Tagline -->
  <text x="190" y="228" font-family="Calibri, Arial, sans-serif" font-size="16" fill="#CBD5E1" font-style="italic">
    Making welfare schemes accessible through natural conversation — in Hindi &amp; English
  </text>

  <!-- Bottom tech stack bar -->
  <rect x="0" y="275" width="1200" height="45" fill="#0D9488"/>

  <!-- Tech badges -->
  <g transform="translate(190, 287)">
    <text x="0" y="14" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">VAPI</text>
    <text x="55" y="14" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#CCFBF1">•</text>
    <text x="75" y="14" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">QDRANT</text>
    <text x="150" y="14" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#CCFBF1">•</text>
    <text x="170" y="14" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">FASTAPI</text>
    <text x="250" y="14" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#CCFBF1">•</text>
    <text x="270" y="14" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">PYTHON</text>
  </g>

  <!-- Right side badge -->
  <text x="1170" y="303" text-anchor="end" font-family="Trebuchet MS, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">
    Team Batman  |  HackBlr 2026
  </text>
</svg>
